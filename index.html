<!DOCTYPE html>
<html>
<head>
  <title>Harti zgomot feroviar</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 90vh; }
    #controls {
      padding: 10px;
      background: white;
    }
  </style>
</head>
<body>

<div id="controls">
  <b>Selectează layer:</b>
  <select id="layerSelect">
    <option value="lden">Lden</option>
    <option value="lnight">Lnight</option>
  </select>
</div>

<div id="map"></div>

<script>
var map = L.map('map').setView([45.7, 25], 6);

// fundal
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// WMS URL bază
var wmsUrl = "https://geonoise.mmap.ro/ows/services/org.3.3828093b-73dc-408e-b215-1e668f30da51_wms";

// layere
var lden = L.tileLayer.wms(wmsUrl, {
  layers: 'NoiseContours_majorRailwaysIncludingAgglomeration_Lden',
  format: 'image/png',
  transparent: true
});

var lnight = L.tileLayer.wms(wmsUrl, {
  layers: 'NoiseContours_majorRailwaysIncludingAgglomeration_Lnight',
  format: 'image/png',
  transparent: true
});

// layer default
lden.addTo(map);

// selector
document.getElementById("layerSelect").addEventListener("change", function() {
  map.eachLayer(function(layer) {
    if (layer !== map._layers[Object.keys(map._layers)[0]]) {
      map.removeLayer(layer);
    }
  });

  if (this.value === "lden") {
    lden.addTo(map);
  } else {
    lnight.addTo(map);
  }
});
</script>

</body>
</html>
